name: Build and Release All Extensions

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build All Sub-Modules
        run: ./gradlew buildVeenaPlugin

      - name: Publish All Generated Packages
        uses: softprops/action-gh-release@v2
        with:
          files: "**/build/veena/*.veena"
          tag_name: ${{ github.ref_name }}
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}